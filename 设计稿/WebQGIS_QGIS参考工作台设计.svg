<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000">
  <defs>
    <style>
      .app { fill: #d8d8d8; }
      .menubar { fill: #eeeeee; stroke: #a9a9a9; stroke-width: 1; }
      .toolbar { fill: #e4e4e4; stroke: #a5a5a5; stroke-width: 1; }
      .dock { fill: #f3f3f3; stroke: #9f9f9f; stroke-width: 1; }
      .dock-title { fill: #d7d7d7; stroke: #9e9e9e; stroke-width: 1; }
      .pane { fill: #fafafa; stroke: #b7b7b7; stroke-width: 1; }
      .row { fill: #ffffff; stroke: #d0d0d0; stroke-width: 1; }
      .row-alt { fill: #f5f5f5; stroke: #d0d0d0; stroke-width: 1; }
      .row-active { fill: #cfe8ff; stroke: #4b8edb; stroke-width: 1; }
      .input { fill: #ffffff; stroke: #aeb6bf; stroke-width: 1; }
      .readonly { fill: #ececec; stroke: #b5b5b5; stroke-width: 1; }
      .button { fill: #e8e8e8; stroke: #8f8f8f; stroke-width: 1; }
      .button-primary { fill: #d9e9f8; stroke: #6f9fc9; stroke-width: 1; }
      .button-danger { fill: #f3dddd; stroke: #b88b8b; stroke-width: 1; }
      .text { font-family: "Segoe UI", "Microsoft YaHei UI", Arial, sans-serif; fill: #1f1f1f; }
      .mono { font-family: "Consolas", "Cascadia Mono", monospace; fill: #1f1f1f; }
      .muted { fill: #5f6670; }
      .green { fill: #2f6f3e; }
      .blue { fill: #145aa3; }
      .warn { fill: #915c00; }
      .danger-text { fill: #9a1c1c; }
      .tiny { font-size: 11px; }
      .xs { font-size: 12px; }
      .small { font-size: 13px; }
      .label { font-size: 13px; font-weight: 600; }
      .title { font-size: 16px; font-weight: 600; }
      .menu { font-size: 13px; }
      .tool { fill: #efefef; stroke: #8d8d8d; stroke-width: 1; }
      .tool-pressed { fill: #b8d6f0; stroke: #4d86ba; stroke-width: 1; }
      .tool-disabled { fill: #dddddd; stroke: #b8b8b8; stroke-width: 1; opacity: .75; }
      .icon-dark { stroke: #313131; stroke-width: 1.6; fill: none; stroke-linecap: square; stroke-linejoin: miter; }
      .icon-fill { fill: #4b5563; stroke: #313131; stroke-width: 1; }
      .map-bg { fill: #f6f4e9; }
      .map-grid { stroke: #d7d0b9; stroke-width: 1; opacity: .55; }
      .parcel { fill: #d7dfc3; stroke: #778866; stroke-width: 1.4; }
      .parcel2 { fill: #d3ddd6; stroke: #6d8475; stroke-width: 1.4; }
      .selected { fill: rgba(244, 171, 103, .48); stroke: #d36a1f; stroke-width: 2.2; }
      .road-casing { stroke: #a88b5b; stroke-width: 10; fill: none; stroke-linecap: round; stroke-linejoin: round; }
      .road { stroke: #f0dfac; stroke-width: 7; fill: none; stroke-linecap: round; stroke-linejoin: round; }
      .river { stroke: #9cc6db; stroke-width: 18; fill: none; stroke-linecap: round; opacity: .88; }
      .river-line { stroke: #6da7c8; stroke-width: 1.5; fill: none; opacity: .7; }
      .node { fill: #fff8ef; stroke: #d36a1f; stroke-width: 2; }
      .statusbar { fill: #eeeeee; stroke: #a0a0a0; stroke-width: 1; }
    </style>
    <pattern id="mapGrid" width="64" height="64" patternUnits="userSpaceOnUse">
      <path d="M64 0H0V64" class="map-grid" fill="none"/>
    </pattern>
    <marker id="arrow" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0 0 L6 3 L0 6 Z" fill="#4b5563"/>
    </marker>
  </defs>

